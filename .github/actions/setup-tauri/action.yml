name: Setup Tauri build
description: Install Node dependencies and the Rust toolchain for Tauri builds.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "22"
  rust-targets:
    description: Comma-separated Rust targets to install.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: package-lock.json

    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-targets }}

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri -> target
        key: ${{ runner.os }}-${{ inputs.rust-targets }}
        cache-on-failure: true

    - name: Install npm dependencies
      shell: bash
      run: npm ci
