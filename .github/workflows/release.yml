name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel"
        type: choice
        options:
          - development
          - stable
        default: development
      credential_store:
        description: "Credential store backend"
        type: choice
        options:
          - local
          - keychain
          - auto
        default: local
      draft:
        description: "Create draft release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  prepare-manual-release:
    name: Prepare manual release
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_name: ${{ steps.release.outputs.release_name }}
    steps:
      - name: Prepare GitHub release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
          RELEASE_DRAFT: ${{ inputs.draft }}
        run: |
          set -euo pipefail
          RELEASE_TAG="${RELEASE_CHANNEL}-build-${GITHUB_RUN_NUMBER}"
          RELEASE_NAME="EMR Management Tool ${RELEASE_CHANNEL} build ${GITHUB_RUN_NUMBER}"
          create_args=(--title "$RELEASE_NAME" --notes "Manual ${RELEASE_CHANNEL} test packages. Automatic updates are disabled.")
          if [[ "$RELEASE_CHANNEL" == "development" ]]; then
            create_args+=(--prerelease)
          fi
          if [[ "$RELEASE_DRAFT" == "true" ]]; then
            create_args+=(--draft)
          fi

          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" "${create_args[@]}"
          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            gh release delete-asset "$RELEASE_TAG" "$asset" -y
          done

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

  manual-development-packages:
    name: Development package (${{ matrix.label }})
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_channel == 'development' }}
    needs: prepare-manual-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-amd64
            os: macos-latest
            rust_targets: x86_64-apple-darwin
            platform: darwin
            build_args: "--debug --target x86_64-apple-darwin --config src-tauri/tauri.development.conf.json"
            bundle_dir: src-tauri/target/x86_64-apple-darwin/debug/bundle
            artifact_patterns: "*.dmg;*.pkg;*.app.tar.gz"
          - label: macos-arm64
            os: macos-latest
            rust_targets: aarch64-apple-darwin
            platform: darwin
            build_args: "--debug --target aarch64-apple-darwin --config src-tauri/tauri.development.conf.json"
            bundle_dir: src-tauri/target/aarch64-apple-darwin/debug/bundle
            artifact_patterns: "*.dmg;*.pkg;*.app.tar.gz"
          - label: windows-amd64
            os: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            platform: windows
            build_args: "--debug --config src-tauri/tauri.development.conf.json"
            bundle_dir: src-tauri/target/debug/bundle
            artifact_patterns: "*.exe;*.msi;*.zip"
    env:
      RELEASE_CHANNEL: ${{ inputs.release_channel }}
      EMR_CREDENTIAL_STORE: ${{ inputs.credential_store }}
      REQUIRE_UPDATER_PUBLIC_KEY: "false"
      VITE_APP_CHANNEL: ${{ inputs.release_channel }}
      VITE_APP_PLATFORM: ${{ matrix.platform }}
      ARTIFACT_LABEL: ${{ matrix.label }}
      BUNDLE_DIR: ${{ matrix.bundle_dir }}
      ARTIFACT_PATTERNS: ${{ matrix.artifact_patterns }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - run: npm ci

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - name: Build package
        run: npm run tauri -- build ${{ matrix.build_args }}

      - name: Analyze build artifacts
        shell: bash
        run: |
          if command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN=python3
          else
            PYTHON_BIN=python
          fi
          "$PYTHON_BIN" <<'PY'
          import os
          import shutil
          from pathlib import Path

          label = os.environ["ARTIFACT_LABEL"]
          bundle_dir = Path(os.environ["BUNDLE_DIR"])
          stage_dir = Path("release-artifacts")
          stage_dir.mkdir(exist_ok=True)

          print(f"Inspecting {bundle_dir}")
          if bundle_dir.exists():
              for path in sorted(bundle_dir.rglob("*")):
                  print(path)
          else:
              raise SystemExit(f"Expected bundle directory does not exist: {bundle_dir}")

          artifacts = [
              path
              for pattern in os.environ["ARTIFACT_PATTERNS"].split(";")
              for path in bundle_dir.rglob(pattern)
              if path.is_file()
          ]
          if not artifacts:
              raise SystemExit(f"No installable artifacts found in {bundle_dir}")

          for artifact in artifacts:
              destination = stage_dir / f"{label}-{artifact.name}"
              shutil.copy2(artifact, destination)
              print(f"Prepared {destination}")
          PY

      - name: Upload artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-manual-release.outputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber

  manual-stable-windows-package:
    name: Stable Windows package
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_channel == 'stable' }}
    needs: prepare-manual-release
    runs-on: windows-latest
    env:
      RELEASE_CHANNEL: ${{ inputs.release_channel }}
      EMR_CREDENTIAL_STORE: ${{ inputs.credential_store }}
      REQUIRE_UPDATER_PUBLIC_KEY: "false"
      VITE_APP_CHANNEL: ${{ inputs.release_channel }}
      VITE_APP_PLATFORM: windows
      ARTIFACT_LABEL: stable-windows-amd64
      BUNDLE_DIR: src-tauri/target/release/bundle
      ARTIFACT_PATTERNS: "*.exe;*.msi;*.zip"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - run: npm ci

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - name: Build package
        run: npm run tauri -- build --config src-tauri/tauri.conf.json

      - name: Analyze build artifacts
        shell: bash
        run: |
          if command -v python3 >/dev/null 2>&1; then
            PYTHON_BIN=python3
          else
            PYTHON_BIN=python
          fi
          "$PYTHON_BIN" <<'PY'
          import os
          import shutil
          from pathlib import Path

          label = os.environ["ARTIFACT_LABEL"]
          bundle_dir = Path(os.environ["BUNDLE_DIR"])
          stage_dir = Path("release-artifacts")
          stage_dir.mkdir(exist_ok=True)

          print(f"Inspecting {bundle_dir}")
          if bundle_dir.exists():
              for path in sorted(bundle_dir.rglob("*")):
                  print(path)
          else:
              raise SystemExit(f"Expected bundle directory does not exist: {bundle_dir}")

          artifacts = [
              path
              for pattern in os.environ["ARTIFACT_PATTERNS"].split(";")
              for path in bundle_dir.rglob(pattern)
              if path.is_file()
          ]
          if not artifacts:
              raise SystemExit(f"No installable artifacts found in {bundle_dir}")

          for artifact in artifacts:
              destination = stage_dir / f"{label}-{artifact.name}"
              shutil.copy2(artifact, destination)
              print(f"Prepared {destination}")
          PY

      - name: Upload artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-manual-release.outputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber

  windows-release:
    name: Windows release package
    if: ${{ github.event_name == 'push' }}
    runs-on: windows-latest
    env:
      RELEASE_CHANNEL: stable
      EMR_CREDENTIAL_STORE: ${{ vars.EMR_CREDENTIAL_STORE || 'keychain' }}
      RELEASE_VERSION: ${{ github.ref_name }}
      REQUIRE_UPDATER_PUBLIC_KEY: "true"
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
      VITE_APP_CHANNEL: stable
      VITE_APP_PLATFORM: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: "EMR Management Tool ${{ github.ref_name }}"
          prerelease: false
          releaseDraft: false
          includeUpdaterJson: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
