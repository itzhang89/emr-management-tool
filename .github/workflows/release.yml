name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Release channel"
        type: choice
        options: [development, stable]
        default: development
      credential_store:
        description: "Credential store backend"
        type: choice
        options: [local, keychain, auto]
        default: local
      package_target:
        description: "Package target"
        type: choice
        options: [all, macos, macos-arm64, macos-amd64, windows]
        default: all
      draft:
        description: "Create draft release"
        type: boolean
        default: true

permissions:
  contents: write

# ─────────────────────────────────────────────
# 公共步骤：安装依赖 + 归档制品
# ─────────────────────────────────────────────
jobs:

  # ── 手动触发：创建/清空 Release ──────────────
  prepare-release:
    name: Prepare release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      release_tag:     ${{ steps.rel.outputs.release_tag }}
      release_name:    ${{ steps.rel.outputs.release_name }}
      release_version: ${{ steps.rel.outputs.release_version }}
      dev_matrix:      ${{ steps.rel.outputs.dev_matrix }}
      stable_matrix:   ${{ steps.rel.outputs.stable_matrix }}
    steps:
      - name: Create or reset GitHub release
        id: rel
        env:
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:         ${{ github.repository }}
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
          RELEASE_DRAFT:   ${{ inputs.draft }}
          PACKAGE_TARGET:  ${{ inputs.package_target }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_CHANNEL}-build-${GITHUB_RUN_NUMBER}"
          NAME="EMR Management Tool ${RELEASE_CHANNEL} build ${GITHUB_RUN_NUMBER}"

          args=(--title "$NAME" --notes "Manual ${RELEASE_CHANNEL} packages.")
          if [[ "$RELEASE_CHANNEL" == "stable" ]]; then
            args=(--title "$NAME" --notes "Manual stable packages. When updater keys are configured, latest.json is published to stable-channel for in-app updates.")
          fi
          [[ "$RELEASE_CHANNEL" == "development" ]] && args+=(--prerelease)
          [[ "$RELEASE_DRAFT"   == "true"        ]] && args+=(--draft)

          gh release view "$TAG" >/dev/null 2>&1 \
            || gh release create "$TAG" "${args[@]}"

          # 删除旧制品，保持 release 干净
          gh release view "$TAG" --json assets --jq '.assets[].name' \
            | xargs -r -I{} gh release delete-asset "$TAG" {} -y

          echo "release_tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "release_name=$NAME" >> "$GITHUB_OUTPUT"
          if [[ "$RELEASE_CHANNEL" == "stable" ]]; then
            echo "release_version=0.1.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi
          node <<'JS' >> "$GITHUB_OUTPUT"
          const target = process.env.PACKAGE_TARGET || "all";
          const matches = (item) => target === "all" || item.package_target === target || item.package_group === target;

          const devPackages = [
            {
              label: "macos-amd64",
              os: "macos-latest",
              rust_targets: "x86_64-apple-darwin",
              platform: "darwin",
              package_target: "macos-amd64",
              package_group: "macos",
              build_args: "--debug --target x86_64-apple-darwin --config src-tauri/tauri.development.conf.json",
              bundle_dir: "src-tauri/target/x86_64-apple-darwin/debug/bundle",
              artifact_patterns: "*.dmg;*.pkg;*.app.tar.gz"
            },
            {
              label: "macos-arm64",
              os: "macos-latest",
              rust_targets: "aarch64-apple-darwin",
              platform: "darwin",
              package_target: "macos-arm64",
              package_group: "macos",
              build_args: "--debug --target aarch64-apple-darwin --config src-tauri/tauri.development.conf.json",
              bundle_dir: "src-tauri/target/aarch64-apple-darwin/debug/bundle",
              artifact_patterns: "*.dmg;*.pkg;*.app.tar.gz"
            },
            {
              label: "windows-amd64",
              os: "windows-latest",
              rust_targets: "x86_64-pc-windows-msvc",
              platform: "windows",
              package_target: "windows",
              package_group: "windows",
              build_args: "--debug --config src-tauri/tauri.development.conf.json",
              bundle_dir: "src-tauri/target/debug/bundle",
              artifact_patterns: "*.exe;*.msi;*.zip"
            }
          ];

          const stablePackages = [
            {
              label: "stable-macos-amd64",
              os: "macos-latest",
              rust_targets: "x86_64-apple-darwin",
              platform: "darwin",
              package_target: "macos-amd64",
              package_group: "macos",
              build_args: "--target x86_64-apple-darwin --config src-tauri/tauri.conf.json",
              bundle_dir: "src-tauri/target/x86_64-apple-darwin/release/bundle",
              artifact_patterns: "*.dmg;*.pkg;*.app.tar.gz;*.sig"
            },
            {
              label: "stable-macos-arm64",
              os: "macos-latest",
              rust_targets: "aarch64-apple-darwin",
              platform: "darwin",
              package_target: "macos-arm64",
              package_group: "macos",
              build_args: "--target aarch64-apple-darwin --config src-tauri/tauri.conf.json",
              bundle_dir: "src-tauri/target/aarch64-apple-darwin/release/bundle",
              artifact_patterns: "*.dmg;*.pkg;*.app.tar.gz;*.sig"
            },
            {
              label: "stable-windows-amd64",
              os: "windows-latest",
              rust_targets: "x86_64-pc-windows-msvc",
              platform: "windows",
              package_target: "windows",
              package_group: "windows",
              build_args: "--config src-tauri/tauri.conf.json",
              bundle_dir: "src-tauri/target/release/bundle",
              artifact_patterns: "*.exe;*.msi;*.zip;*.sig"
            }
          ];

          console.log(`dev_matrix=${JSON.stringify({ include: devPackages.filter(matches) })}`);
          console.log(`stable_matrix=${JSON.stringify({ include: stablePackages.filter(matches) })}`);
          JS

  # ── 检测 Tauri updater 签名密钥是否配置 ───────
  detect-updater:
    name: Detect updater signing keys
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      has_updater_keys: ${{ steps.check.outputs.has_updater_keys }}
    steps:
      - name: Check secrets
        id: check
        env:
          TAURI_UPDATER_PUBLIC_KEY:  ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -n "$TAURI_UPDATER_PUBLIC_KEY" && -n "$TAURI_SIGNING_PRIVATE_KEY" ]]; then
            echo "has_updater_keys=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updater_keys=false" >> "$GITHUB_OUTPUT"
          fi

  # ── 检测 Apple 开发者证书是否配置 ────────────
  # 输出 has_apple_certs=true/false，供下游 job 决定
  # credential_store：若无证书则强制 local，否则使用用户输入值
  detect-signing:
    name: Detect Apple signing certs
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      has_apple_certs:  ${{ steps.check.outputs.has_apple_certs }}
      credential_store: ${{ steps.check.outputs.credential_store }}
    steps:
      - name: Check secrets
        id: check
        env:
          # 将 secret 映射为环境变量；若未设置则为空字符串
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          INPUT_CRED_STORE:  ${{ github.event_name == 'workflow_dispatch' && inputs.credential_store || 'local' }}
        run: |
          if [[ -n "$APPLE_CERTIFICATE" ]]; then
            echo "has_apple_certs=true"  >> "$GITHUB_OUTPUT"
            echo "credential_store=${INPUT_CRED_STORE}" >> "$GITHUB_OUTPUT"
          else
            echo "has_apple_certs=false" >> "$GITHUB_OUTPUT"
            # 无证书时强制 local，避免 keychain/auto 在无签名环境下静默失败
            echo "credential_store=local" >> "$GITHUB_OUTPUT"
            echo "::warning::APPLE_CERTIFICATE not set — forcing EMR_CREDENTIAL_STORE=local"
          fi

  # ── 手动触发 · 开发包（macOS amd64/arm64 + Windows）──
  dev-packages:
    name: Dev package (${{ matrix.label }})
    if: github.event_name == 'workflow_dispatch' && inputs.release_channel == 'development'
    needs: [prepare-release, detect-signing]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-release.outputs.dev_matrix) }}

    env:
      RELEASE_CHANNEL:         development
      EMR_CREDENTIAL_STORE:    ${{ needs.detect-signing.outputs.credential_store }}
      REQUIRE_UPDATER_PUBLIC_KEY: "false"
      VITE_APP_CHANNEL:        development
      VITE_APP_PLATFORM:       ${{ matrix.platform }}
      ARTIFACT_LABEL:          ${{ matrix.label }}
      BUNDLE_DIR:              ${{ matrix.bundle_dir }}
      ARTIFACT_PATTERNS:       ${{ matrix.artifact_patterns }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-tauri
        with:
          rust-targets: ${{ matrix.rust_targets }}

      # macOS：仅在有证书时导入 keychain
      - name: Import Apple certificates
        if: matrix.platform == 'darwin' && needs.detect-signing.outputs.has_apple_certs == 'true'
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k actions build.keychain

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - name: Build package
        run: npm run tauri -- build ${{ matrix.build_args }}

      - name: Stage artifacts
        uses: ./.github/actions/prepare-artifacts
        with:
          artifact-label: ${{ matrix.label }}
          bundle-dir: ${{ matrix.bundle_dir }}
          artifact-patterns: ${{ matrix.artifact_patterns }}

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:     ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber

  # ── 手动触发 · 稳定包（macOS amd64/arm64 + Windows）──
  stable-packages:
    name: Stable package (${{ matrix.label }})
    if: github.event_name == 'workflow_dispatch' && inputs.release_channel == 'stable'
    needs: [prepare-release, detect-signing, detect-updater]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-release.outputs.stable_matrix) }}

    env:
      RELEASE_CHANNEL:                  stable
      RELEASE_VERSION:                  ${{ needs.prepare-release.outputs.release_version }}
      EMR_CREDENTIAL_STORE:             ${{ needs.detect-signing.outputs.credential_store }}
      REQUIRE_UPDATER_PUBLIC_KEY:       ${{ needs.detect-updater.outputs.has_updater_keys == 'true' && 'true' || 'false' }}
      TAURI_UPDATER_PUBLIC_KEY:         ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY:        ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      VITE_APP_CHANNEL:                 stable
      VITE_APP_PLATFORM:                ${{ matrix.platform }}
      VITE_APP_VERSION:                 ${{ needs.prepare-release.outputs.release_version }}
      ARTIFACT_LABEL:                     ${{ matrix.label }}
      BUNDLE_DIR:                         ${{ matrix.bundle_dir }}
      ARTIFACT_PATTERNS:                  ${{ matrix.artifact_patterns }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-tauri
        with:
          rust-targets: ${{ matrix.rust_targets }}

      - name: Import Apple certificates
        if: matrix.platform == 'darwin' && needs.detect-signing.outputs.has_apple_certs == 'true'
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k actions build.keychain

      - name: Prepare release config
        env:
          RELEASE_VERSION:        ${{ needs.prepare-release.outputs.release_version }}
          APPLE_CERTIFICATE:      ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: node scripts/prepare-release-config.mjs

      - name: Build package
        env:
          TAURI_SIGNING_PRIVATE_KEY:           ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD:  ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri -- build ${{ matrix.build_args }}

      - name: Stage artifacts
        uses: ./.github/actions/prepare-artifacts
        with:
          artifact-label: ${{ matrix.label }}
          bundle-dir: ${{ matrix.bundle_dir }}
          artifact-patterns: ${{ matrix.artifact_patterns }}

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:     ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber

  # ── 手动触发 · stable 更新清单（latest.json）──
  publish-stable-updater:
    name: Publish stable updater manifest
    if: github.event_name == 'workflow_dispatch' && inputs.release_channel == 'stable' && needs.detect-updater.outputs.has_updater_keys == 'true'
    needs: [prepare-release, stable-packages, detect-updater]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build latest.json
        env:
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          RELEASE_VERSION:     ${{ needs.prepare-release.outputs.release_version }}
          RELEASE_TAG:         ${{ needs.prepare-release.outputs.release_tag }}
          RELEASE_NOTES:       Stable build ${{ github.run_number }}
        run: node scripts/publish-updater-manifest.mjs
      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ needs.prepare-release.outputs.release_tag }}" latest.json \
            --repo "${{ github.repository }}" --clobber
          if ! gh release view stable-channel --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create stable-channel \
              --repo "${{ github.repository }}" \
              --title "Stable channel" \
              --notes "Rolling latest.json for in-app updates from CI stable builds." \
              --prerelease
          fi
          gh release upload stable-channel latest.json \
            --repo "${{ github.repository }}" --clobber

  # ── tag push · 校验 tag 版本号 ───────────────
  resolve-tag-version:
    name: Resolve tag version
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.validate.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate semver tag
        id: validate
        run: node scripts/validate-release-tag.mjs

  # ── tag push · 正式发版（Windows + macOS，含 updater 清单）──
  stable-release:
    name: Stable release (${{ matrix.label }})
    if: github.event_name == 'push'
    needs: [detect-updater, detect-signing, resolve-tag-version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-amd64
            os: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            platform: windows
            build_args: ""
          - label: macos-arm64
            os: macos-latest
            rust_targets: aarch64-apple-darwin
            platform: darwin
            build_args: "--target aarch64-apple-darwin"
          - label: macos-amd64
            os: macos-latest
            rust_targets: x86_64-apple-darwin
            platform: darwin
            build_args: "--target x86_64-apple-darwin"
    env:
      RELEASE_CHANNEL:                  stable
      EMR_CREDENTIAL_STORE:             ${{ matrix.platform == 'windows' && (vars.EMR_CREDENTIAL_STORE || 'keychain') || 'local' }}
      RELEASE_VERSION:                  ${{ github.ref_name }}
      VITE_APP_VERSION:                 ${{ needs.resolve-tag-version.outputs.app_version }}
      REQUIRE_UPDATER_PUBLIC_KEY:         "true"
      TAURI_UPDATER_PUBLIC_KEY:         ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY:        ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_SIGN_COMMAND:             ${{ secrets.WINDOWS_SIGN_COMMAND }}
      VITE_APP_CHANNEL:                   stable
      VITE_APP_PLATFORM:                  ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-tauri
        with:
          rust-targets: ${{ matrix.rust_targets }}
      - name: Import Apple certificates
        if: matrix.platform == 'darwin' && needs.detect-signing.outputs.has_apple_certs == 'true'
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k actions build.keychain
      - name: Prepare release config
        env:
          RELEASE_VERSION:        ${{ github.ref_name }}
          VITE_APP_VERSION:       ${{ needs.resolve-tag-version.outputs.app_version }}
          APPLE_CERTIFICATE:      ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: node scripts/prepare-release-config.mjs
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                        ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:           ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD:  ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript:        npm run tauri
          tagName:            ${{ github.ref_name }}
          releaseName:        "EMR Management Tool ${{ github.ref_name }}"
          prerelease:         false
          releaseDraft:       false
          includeUpdaterJson: false
          args:               ${{ matrix.build_args }}

  publish-tag-updater-manifest:
    name: Publish tag updater manifest
    if: github.event_name == 'push' && needs.detect-updater.outputs.has_updater_keys == 'true'
    needs: [detect-updater, stable-release, resolve-tag-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build latest.json
        env:
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION:   ${{ needs.resolve-tag-version.outputs.app_version }}
          RELEASE_TAG:       ${{ github.ref_name }}
          RELEASE_NOTES:     Release ${{ github.ref_name }}
        run: node scripts/publish-updater-manifest.mjs
      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload "${{ github.ref_name }}" latest.json \
            --repo "${{ github.repository }}" --clobber
          if ! gh release view stable-channel --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create stable-channel \
              --repo "${{ github.repository }}" \
              --title "Stable channel" \
              --notes "Rolling latest.json for in-app updates from CI stable builds." \
              --prerelease
          fi
          gh release upload stable-channel latest.json \
            --repo "${{ github.repository }}" --clobber