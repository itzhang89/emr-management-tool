name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Development version, for example 0.2.0-dev.1"
        required: true
      draft:
        description: "Create draft release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  prepare-development-release:
    name: Prepare development release
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Prepare GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ format('dev-v{0}', inputs.version) }}
          RELEASE_NAME: EMR Management Tool Dev ${{ inputs.version }}
          RELEASE_DRAFT: ${{ inputs.draft }}
        run: |
          set -euo pipefail
          create_args=(--title "$RELEASE_NAME" --prerelease --notes "Development test packages. Automatic updates are disabled.")
          if [[ "$RELEASE_DRAFT" == "true" ]]; then
            create_args+=(--draft)
          fi

          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || gh release create "$RELEASE_TAG" "${create_args[@]}"
          gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
            gh release delete-asset "$RELEASE_TAG" "$asset" -y
          done

  macos-development-amd64:
    name: macOS development package (amd64)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: prepare-development-release
    runs-on: macos-latest
    env:
      RELEASE_CHANNEL: development
      RELEASE_VERSION: ${{ inputs.version }}
      REQUIRE_UPDATER_PUBLIC_KEY: "false"
      VITE_APP_CHANNEL: development
      VITE_APP_PLATFORM: darwin
      MACOS_TARGET: x86_64-apple-darwin
      ARTIFACT_LABEL: macos-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - run: npm ci

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - name: Build development package
        run: npm run tauri -- build --debug --target x86_64-apple-darwin --config src-tauri/tauri.development.conf.json

      - name: Analyze build artifacts
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import shutil
          from pathlib import Path

          label = os.environ["ARTIFACT_LABEL"]
          bundle_dir = Path("src-tauri/target") / os.environ["MACOS_TARGET"] / "debug" / "bundle"
          stage_dir = Path("release-artifacts")
          stage_dir.mkdir(exist_ok=True)

          print(f"Inspecting {bundle_dir}")
          if bundle_dir.exists():
            for path in sorted(bundle_dir.rglob("*")):
              print(path)
          else:
            raise SystemExit(f"Expected bundle directory does not exist: {bundle_dir}")

          patterns = ("*.dmg", "*.pkg", "*.app.tar.gz")
          artifacts = [path for pattern in patterns for path in bundle_dir.rglob(pattern) if path.is_file()]
          if not artifacts:
            raise SystemExit(f"No installable macOS artifacts found in {bundle_dir}")

          for artifact in artifacts:
            destination = stage_dir / f"{label}-{artifact.name}"
            shutil.copy2(artifact, destination)
            print(f"Prepared {destination}")
          PY

      - name: Upload development artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ format('dev-v{0}', inputs.version) }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber

  macos-development-arm64:
    name: macOS development package (arm64)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: prepare-development-release
    runs-on: macos-latest
    env:
      RELEASE_CHANNEL: development
      RELEASE_VERSION: ${{ inputs.version }}
      REQUIRE_UPDATER_PUBLIC_KEY: "false"
      VITE_APP_CHANNEL: development
      VITE_APP_PLATFORM: darwin
      MACOS_TARGET: aarch64-apple-darwin
      ARTIFACT_LABEL: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - run: npm ci

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - name: Build development package
        run: npm run tauri -- build --debug --target aarch64-apple-darwin --config src-tauri/tauri.development.conf.json

      - name: Analyze build artifacts
        run: |
          set -euo pipefail
          python3 <<'PY'
          import os
          import shutil
          from pathlib import Path

          label = os.environ["ARTIFACT_LABEL"]
          bundle_dir = Path("src-tauri/target") / os.environ["MACOS_TARGET"] / "debug" / "bundle"
          stage_dir = Path("release-artifacts")
          stage_dir.mkdir(exist_ok=True)

          print(f"Inspecting {bundle_dir}")
          if bundle_dir.exists():
            for path in sorted(bundle_dir.rglob("*")):
              print(path)
          else:
            raise SystemExit(f"Expected bundle directory does not exist: {bundle_dir}")

          patterns = ("*.dmg", "*.pkg", "*.app.tar.gz")
          artifacts = [path for pattern in patterns for path in bundle_dir.rglob(pattern) if path.is_file()]
          if not artifacts:
            raise SystemExit(f"No installable macOS artifacts found in {bundle_dir}")

          for artifact in artifacts:
            destination = stage_dir / f"{label}-{artifact.name}"
            shutil.copy2(artifact, destination)
            print(f"Prepared {destination}")
          PY

      - name: Upload development artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ format('dev-v{0}', inputs.version) }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber

  windows-development:
    name: Windows development package
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: prepare-development-release
    runs-on: windows-latest
    env:
      RELEASE_CHANNEL: development
      RELEASE_VERSION: ${{ inputs.version }}
      REQUIRE_UPDATER_PUBLIC_KEY: "false"
      VITE_APP_CHANNEL: development
      VITE_APP_PLATFORM: windows
      ARTIFACT_LABEL: windows-amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - name: Build development package
        run: npm run tauri -- build --debug --config src-tauri/tauri.development.conf.json

      - name: Analyze build artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $bundleDir = "src-tauri/target/debug/bundle"
          $stageDir = "release-artifacts"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          Write-Host "Inspecting $bundleDir"
          if (-not (Test-Path $bundleDir)) {
            throw "Expected bundle directory does not exist: $bundleDir"
          }

          Get-ChildItem -Path $bundleDir -Recurse | ForEach-Object { Write-Host $_.FullName }
          $artifacts = Get-ChildItem -Path $bundleDir -Recurse -File | Where-Object {
            $_.Extension -in ".exe", ".msi", ".zip"
          }

          if (-not $artifacts) {
            throw "No installable Windows artifacts found in $bundleDir"
          }

          foreach ($artifact in $artifacts) {
            $destination = Join-Path $stageDir "$env:ARTIFACT_LABEL-$($artifact.Name)"
            Copy-Item -Path $artifact.FullName -Destination $destination
            Write-Host "Prepared $destination"
          }

      - name: Upload development artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ format('dev-v{0}', inputs.version) }}
        run: gh release upload "$env:RELEASE_TAG" release-artifacts/* --clobber

  windows-release:
    name: Windows release package
    if: ${{ github.event_name == 'push' }}
    runs-on: windows-latest
    env:
      RELEASE_CHANNEL: stable
      RELEASE_VERSION: ${{ github.ref_name }}
      REQUIRE_UPDATER_PUBLIC_KEY: "true"
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
      VITE_APP_CHANNEL: stable
      VITE_APP_PLATFORM: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: "EMR Management Tool ${{ github.ref_name }}"
          prerelease: false
          releaseDraft: false
          includeUpdaterJson: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
