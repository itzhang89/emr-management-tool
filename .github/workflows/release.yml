name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Development version, for example 0.2.0-dev.1"
        required: true
      draft:
        description: "Create draft release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  macos-development-x64:
    name: macOS development package (Intel)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: macos-latest
    env:
      RELEASE_CHANNEL: development
      RELEASE_VERSION: ${{ inputs.version }}
      REQUIRE_UPDATER_PUBLIC_KEY: "false"
      VITE_APP_CHANNEL: development
      VITE_APP_PLATFORM: darwin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - run: npm ci

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ format('dev-v{0}', inputs.version) }}
          releaseName: "EMR Management Tool Dev ${{ inputs.version }} macOS Intel"
          prerelease: true
          releaseDraft: ${{ inputs.draft }}
          includeUpdaterJson: false
          args: "--debug --target x86_64-apple-darwin --config src-tauri/tauri.development.conf.json"

  macos-development-arm64:
    name: macOS development package (Apple Silicon)
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: macos-latest
    env:
      RELEASE_CHANNEL: development
      RELEASE_VERSION: ${{ inputs.version }}
      REQUIRE_UPDATER_PUBLIC_KEY: "false"
      VITE_APP_CHANNEL: development
      VITE_APP_PLATFORM: darwin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - run: npm ci

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ format('dev-v{0}', inputs.version) }}
          releaseName: "EMR Management Tool Dev ${{ inputs.version }} macOS Apple Silicon"
          prerelease: true
          releaseDraft: ${{ inputs.draft }}
          includeUpdaterJson: false
          args: "--debug --target aarch64-apple-darwin --config src-tauri/tauri.development.conf.json"

  windows-development:
    name: Windows development package
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    env:
      RELEASE_CHANNEL: development
      RELEASE_VERSION: ${{ inputs.version }}
      REQUIRE_UPDATER_PUBLIC_KEY: "false"
      VITE_APP_CHANNEL: development
      VITE_APP_PLATFORM: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ format('dev-v{0}', inputs.version) }}
          releaseName: "EMR Management Tool Dev ${{ inputs.version }}"
          prerelease: true
          releaseDraft: ${{ inputs.draft }}
          includeUpdaterJson: false
          args: "--debug --config src-tauri/tauri.development.conf.json"

  windows-release:
    name: Windows release package
    if: ${{ github.event_name == 'push' }}
    runs-on: windows-latest
    env:
      RELEASE_CHANNEL: stable
      RELEASE_VERSION: ${{ github.ref_name }}
      REQUIRE_UPDATER_PUBLIC_KEY: "true"
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_SIGN_COMMAND: ${{ secrets.WINDOWS_SIGN_COMMAND }}
      VITE_APP_CHANNEL: stable
      VITE_APP_PLATFORM: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Prepare release config
        run: node scripts/prepare-release-config.mjs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ github.ref_name }}
          releaseName: "EMR Management Tool ${{ github.ref_name }}"
          prerelease: false
          releaseDraft: false
          includeUpdaterJson: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
